services:
  # ── Backend API ───────────────────────────────────────────────
  - type: web
    name: consultamedica-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-sonnet-4-6
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        value: noreply@consultamedica.ai
      - key: DOCTOR_EMAIL
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://consultamedica.ai,https://www.consultamedica.ai
      - key: DATA_DIR
        value: /opt/render/project/src/data

  # ── Frontend Static Site ──────────────────────────────────────
  - type: web
    name: consultamedica-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://consultamedica-api.onrender.com
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
